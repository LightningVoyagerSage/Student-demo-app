<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Student</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-6">

  <div class="bg-gray-800 shadow-2xl rounded-2xl w-full max-w-md p-8">

    <h2 class="text-2xl font-bold text-white mb-1">Add New Student</h2>
    <p class="text-sm text-gray-400 mb-6">Fill in the details to enroll a student</p>

    <form method="POST" class="space-y-5">
      {% csrf_token %}
    
      <!-- Name -->
      <div>
        <label class="block text-gray-300 font-medium mb-1">Full Name</label>
        <input
          type="text"
          name="input_name"
          placeholder="Enter student name"
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 text-white placeholder-gray-500 rounded-lg focus:ring-2 focus:ring-violet-500 focus:outline-none"
          required
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-300 font-medium mb-1">Email Address</label>
        <input
          type="email"
          name="input_email"
          placeholder="Enter email"
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 text-white placeholder-gray-500 rounded-lg focus:ring-2 focus:ring-violet-500 focus:outline-none"
          required
        />
      </div>

      <!-- Phone -->
      <div>
        <label class="block text-gray-300 font-medium mb-1">Phone Number</label>
        <input
          type="tel"
          name="input_phone"
          placeholder="Enter phone number"
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 text-white placeholder-gray-500 rounded-lg focus:ring-2 focus:ring-violet-500 focus:outline-none"
          required
        />
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-2">
        <a href="{% url 'student_home' %}"
          class="flex-1 text-center px-4 py-2 rounded-lg border border-gray-600 text-gray-400 font-medium hover:bg-gray-700 hover:text-white transition">
          Cancel
        </a>
        <button
          type="submit"
          class="flex-1 px-4 py-2 rounded-lg bg-violet-600 text-white font-medium hover:bg-violet-700 transition">
          Add Student
        </button>
      </div>

    </form>
  </div>

</body>
</html>
