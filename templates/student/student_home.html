<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Directory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Sora', sans-serif; }
    body { background: #0f0f13; }

    .card {
      background: linear-gradient(135deg, #1a1a24 0%, #16161f 100%);
      border: 1px solid rgba(255,255,255,0.07);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(139,92,246,0.2);
    }

    .avatar {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
    }

    .badge {
      background: rgba(139,92,246,0.12);
      color: #a78bfa;
      border: 1px solid rgba(139,92,246,0.25);
    }

    .btn-edit {
      background: rgba(59,130,246,0.1);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.2);
      transition: all 0.2s;
    }
    .btn-edit:hover { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.5); }

    .btn-view {
      background: rgba(16,185,129,0.1);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.2);
      transition: all 0.2s;
    }
    .btn-view:hover { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.5); }

    .btn-delete {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
      transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.5); }

    .divider { border-color: rgba(255,255,255,0.06); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.5s ease both; }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
  </style>
</head>
<body class="min-h-screen px-6 py-12">

  <!-- Header -->
  <div class="max-w-5xl mx-auto mb-12">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-xs font-semibold tracking-widest text-violet-400 uppercase mb-1">Management Portal</p>
        <h1 class="text-3xl font-bold text-white">Student Directory</h1>
      </div>
      <a href="{% url 'add_student' %}">
      <button class="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white"
        style="background: linear-gradient(135deg, #7c3aed, #4f46e5);">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        
        Add Student
       
      </button>
     </a>
    </div>
    <hr class="mt-8 divider border-t"/>
  </div>

  <!-- Cards Grid -->
  <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    {% for student in students_data %}

    <!-- Card 1 -->
    <div class="card rounded-2xl p-6">
      <div class="flex items-start justify-between mb-5">
        <div class="flex items-center gap-3">
          <div class="avatar w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-lg flex-shrink-0">A</div>
          <div>
            <h1>
              {{ student.id }}
            </h1>
            <h2 class="text-white font-semibold text-base leading-tight">{{ student.name }}</h2>
            <span class="badge text-xs px-2 py-0.5 rounded-full font-medium mt-0.5 inline-block">Active</span>
          </div>
        </div>
       
      </div>

      <hr class="divider border-t mb-4"/>

      <div class="space-y-3">
        <div class="flex items-center gap-3">
          <div class="w-7 h-7 rounded-lg bg-white/5 flex items-center justify-center flex-shrink-0">
            <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
          <span class="text-gray-400 text-sm truncate">Email: {{student.email}}</span>
        </div>
        <div class="flex items-center gap-3">
          <div class="w-7 h-7 rounded-lg bg-white/5 flex items-center justify-center flex-shrink-0">
            <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
          </div>
          <span class="text-gray-400 text-sm">Phone: {{student.phone_number}}</span>
        </div>
      </div>


      <hr class="divider border-t my-4"/>

      <div class="flex gap-2">
        <a href="{% url 'update_student' student.id %}" class="btn-edit flex-1 py-2 rounded-lg text-xs font-semibold flex items-center justify-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          Update
        </a>


        <a href="{% url 'delete_student' student.id %}" class="btn-delete flex-1 py-2 rounded-lg text-xs font-semibold flex items-center justify-center gap-1.5"> 
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          Delete
      </a>
      </div>
    </div>

    {% endfor %}

  </div>
</body>
</html>
